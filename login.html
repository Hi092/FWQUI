<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f2f3f5;color:#1a1d27;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.box{width:100%;max-width:300px;text-align:center}
.icon{width:52px;height:52px;border-radius:14px;background:rgba(124,92,252,0.12);display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
h1{font-size:20px;font-weight:700;letter-spacing:-0.03em}
.sub{color:#9ca3af;font-size:12px;margin-top:4px;margin-bottom:28px}
.err{display:none;background:rgba(248,113,113,0.1);border-radius:10px;padding:8px;color:#dc2626;font-size:12px;margin-bottom:12px}
input[type=password]{width:100%;padding:11px 14px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;color:#1a1d27;font-size:14px;outline:none;margin-bottom:12px}
input[type=password]:focus{border-color:#7c5cfc;box-shadow:0 0 0 3px rgba(124,92,252,.1)}
.btn{width:100%;padding:11px;background:#7c5cfc;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.btn:active{opacity:0.85}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head><body>
<div class="box">
<div class="icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#7c5cfc" stroke-width="1.5"><path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/></svg></div>
<h1>OneCloud</h1>
<div class="sub">服务器监控</div>
<div class="err" id="err"></div>
<form id="f">
<input type="password" id="pw" placeholder="密码" autofocus>
<button type="submit" class="btn">登录</button>
</form>
</div>
<script>
fetch('/api/verify').then(r=>r.json()).then(d=>{if(d.valid)location.href='/'});
document.getElementById('f').addEventListener('submit',async e=>{
e.preventDefault();
const p=document.getElementById('pw').value;
try{const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:p,remember:true})});
const d=await r.json();
if(d.success)location.href='/';
else{const e=document.getElementById('err');e.style.display='block';e.textContent=d.message||'密码错误';}}catch(e){}
});
</script>
</body></html>
